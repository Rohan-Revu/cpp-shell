name: Build CPP Shell

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libreadline-dev

      - name: Configure CMake
        run: |
          cmake -B build -S .

      - name: Build Project
        run: |
          cmake --build build
